name: Generate GitHub Profile Cards

on:
  workflow_dispatch:
  schedule:
    - cron: "17 7 * * *"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/profile-summary-cards.yml"
      - ".github/scripts/generate_streak.py"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    name: Generate profile summary cards
    steps:
      - name: Check out profile repository
        uses: actions/checkout@v4

      - name: Generate profile cards
        uses: vn7n24fzkq/github-profile-summary-cards@release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          USERNAME: ${{ github.repository_owner }}
          BRANCH_NAME: main
          UTC_OFFSET: "-7"
          AUTO_PUSH: false
          THEME: github_dark
          ANIMATION: load
          DURATION: "2.5"
          NAME: "Aadit Mehta"

      - name: Generate contribution streak card
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_USERNAME: ${{ github.repository_owner }}
        run: python .github/scripts/generate_streak.py

      - name: Commit refreshed cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile-summary-card-output
          if git diff --cached --quiet; then
            echo "Profile cards are already current."
            exit 0
          fi
          git commit -m "chore: refresh GitHub profile cards"
          git push
